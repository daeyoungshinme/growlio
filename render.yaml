services:
  - type: web
    name: growlio-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        sync: false
      - key: KIS_CRED_ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_PROJECT_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DART_API_KEY
        sync: false
      - key: OPEN_BANKING_CLIENT_ID
        sync: false
      - key: OPEN_BANKING_CLIENT_SECRET
        sync: false
      - key: OPEN_BANKING_REDIRECT_URI
        sync: false
      - key: OPEN_BANKING_BASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: FRONTEND_URL
        sync: false
