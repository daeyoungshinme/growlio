repos:
  # ── Backend: Python ──────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        files: ^backend/app/
        args: [--ignore-missing-imports]
        additional_dependencies:
          - pydantic
          - sqlalchemy
          - fastapi

  # ── Frontend: TypeScript / JS ─────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.27.0
    hooks:
      - id: eslint
        files: ^frontend/src/
        types: [file]
        types_or: [javascript, jsx, ts, tsx]
        args: [--fix]
        additional_dependencies:
          - eslint@9
          - typescript-eslint@8

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/src/
        types_or: [javascript, jsx, ts, tsx, css]
        args: [--write]

  # ── 공통 ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^frontend/android/
      - id: end-of-file-fixer
        exclude: ^frontend/android/
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
        exclude: ^frontend/tsconfig.*\.json$
