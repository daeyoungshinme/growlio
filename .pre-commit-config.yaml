repos:
  # ── Backend: Python ──────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix, --unsafe-fixes]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        files: ^backend/app/
        args: [--ignore-missing-imports]
        additional_dependencies:
          - pydantic
          - sqlalchemy
          - fastapi
          - types-requests
          - types-python-dateutil
          - "redis[hiredis]"

  # ── Frontend: TypeScript / JS ─────────────────────────────────
  # ESLint: mirrors-eslint 대신 local system 훅 사용 — frontend/node_modules의 정확한 버전(eslint@10 + 모든 플러그인)을 그대로 사용해야
  # parserOptions.project: true (타입 인식 rules)가 정상 동작. node_modules 없으면 스킵.
  - repo: local
    hooks:
      - id: eslint
        name: ESLint (frontend)
        language: system
        entry: >-
          bash -c 'if [ -x frontend/node_modules/.bin/eslint ]; then cd frontend && ./node_modules/.bin/eslint src --fix; else echo "SKIP: frontend/node_modules 없음 — npm install 실행 필요" && exit 0; fi'
        files: ^frontend/src/
        pass_filenames: false

  - repo: local
    hooks:
      - id: prettier
        name: Prettier (frontend)
        language: system
        entry: >-
          bash -c 'if [ -x frontend/node_modules/.bin/prettier ]; then frontend/node_modules/.bin/prettier --write "$@"; else echo "SKIP: frontend/node_modules 없음 — npm install 실행 필요" && exit 0; fi' dummy
        files: ^frontend/src/
        types_or: [javascript, jsx, ts, tsx, css]

  # ── 공통 ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^frontend/android/
      - id: end-of-file-fixer
        exclude: ^frontend/android/
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
        exclude: ^frontend/tsconfig.*\.json$
