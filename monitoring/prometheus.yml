global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "growlio-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    # METRICS_TOKEN이 설정된 경우 아래 주석 해제
    # authorization:
    #   credentials: "${METRICS_TOKEN}"
    scrape_interval: 15s
    scrape_timeout: 10s
